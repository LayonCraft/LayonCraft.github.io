<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LayonCraft</title>
  <script src="/common-head.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('js');</script>
</head>
<body>
  <header class="hero">
    <div class="hero__blob" aria-hidden="true"></div>
    <h1><img class="hero__wordmark reveal" src="Header.png" alt="LayonCraft"></h1>
    <p class="hero__tagline reveal">I hope the joy and fun I feel can reach you too.</p>
  </header>

  <main>
    <section class="portfolio">
      <div class="card reveal">
        <img class="card__icon" src="slideblockIcon.png" alt="">
        <div class="card__body">
          <h2 class="card__title">Slide Block</h2>
          <p class="card__desc">Slide, match, and clear — a colorful puzzle game.</p>
          <p class="card__credit">by LayonCraft</p>
          <div class="card__actions">
            <a class="card__button" href="https://play.google.com/store/apps/details?id=com.LayonStudio.SlideBlock">View on Google Play</a>
            <a class="card__button card__button--secondary" href="play/slide-block/">Play in Browser</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer__socials">
      <button class="footer__social-link" type="button" id="email-copy" data-email="oortcloud98@gmail.com">Email</button>
      <!-- TODO: replace with real Instagram link -->
      <a class="footer__social-link" href="#">Instagram</a>
      <!-- TODO: replace with real X link -->
      <a class="footer__social-link" href="#">X</a>
    </div>
    <p class="footer__copyright">&copy; 2026 LayonCraft</p>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
