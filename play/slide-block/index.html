<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Block — Play in Browser | LayonCraft</title>
  <script src="/common-head.js"></script>
  <style>
    :root {
      --bg: #0F0F14;
      --accent: #FF3D8A;
      --text: #F5F5F5;
      --text-muted: #A0A0AA;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      gap: 1rem;
    }

    .top-bar {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--accent);
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .game-frame {
      width: 100%;
      max-width: 960px;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    iframe {
      display: block;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a class="back-link" href="../../">&larr; Back to LayonCraft</a>
    <h1>Slide Block</h1>
  </div>

  <div class="game-frame">
    <iframe
      src="game/index.html"
      width="100%"
      height="441px"
      frameborder="0"
      scrolling="no">
    </iframe>
  </div>
</body>
</html>
